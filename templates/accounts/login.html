{% extends 'base.html' %}
{% block content %}
<div class="max-w-7xl mx-auto px-6 h-[80vh] flex items-center justify-center">
    <div class="apple-card w-full max-w-[460px] p-10 md:p-16 bg-white text-center shadow-2xl rounded-[30px]">
        <div class="mb-10">
            <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-3">
                Sign in to <br> <span class="gold-gradient text-yellow-600">Kodi Yangu</span>
            </h2>
            <p class="text-gray-500 text-sm font-medium">Use your secure digital credentials.</p>
        </div>

        <!-- WE USE AN ID HERE FOR JAVASCRIPT -->
        <form id="loginForm" class="space-y-4">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Email Address" 
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-400" required>
            
            <input type="password" name="password" placeholder="Password" 
                class="w-full bg-gray-50 border border-gray-200 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-yellow-400" required>

            <button type="submit" class="w-full py-4 text-lg mt-6 bg-yellow-500 text-white rounded-full font-bold shadow-lg hover:bg-yellow-600 transition">
                Sign In
            </button>
        </form>
    </div>
</div>

<script>
    // This script MUST be inside the block or it won't load
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        // We talk to the "Engine" (The 200 OK page you saw)
        const response = await fetch('/api/login/', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            const result = await response.json();
            console.log("Login Success!");
            // THE MAGIC REDIRECT
            window.location.href = "/dashboard/"; 
        } else {
            alert("Login Failed! Please check your email and password.");
        }
    });
</script>
{% endblock %}
