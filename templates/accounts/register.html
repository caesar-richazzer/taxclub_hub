{% extends 'base.html' %}
{% block content %}
<div class="max-w-xl mx-auto py-20 px-6">
    <div class="apple-card p-12 bg-white rounded-[30px] shadow-sm">
        <h2 class="text-3xl font-bold mb-2 text-center">Join <span class="text-yellow-600">Kodi Yangu</span></h2>
        <p class="text-gray-500 text-center mb-10">Create your secure digital ID.</p>

        <form id="registerForm" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                <input type="text" name="first_name" placeholder="First Name" class="bg-gray-50 border border-gray-200 p-4 rounded-2xl w-full outline-none focus:ring-2 focus:ring-yellow-400" required>
                <input type="text" name="last_name" placeholder="Last Name" class="bg-gray-50 border border-gray-200 p-4 rounded-2xl w-full outline-none focus:ring-2 focus:ring-yellow-400" required>
            </div>
            <input type="email" name="email" placeholder="Email Address" class="bg-gray-50 border border-gray-200 p-4 rounded-2xl w-full outline-none focus:ring-2 focus:ring-yellow-400" required>
            <input type="password" name="password" placeholder="Password (Min 8 characters)" class="bg-gray-50 border border-gray-200 p-4 rounded-2xl w-full outline-none focus:ring-2 focus:ring-yellow-400" required>
            
            <select name="role" class="bg-gray-50 border border-gray-200 p-4 rounded-2xl w-full outline-none font-medium text-gray-700">
                <option value="STUDENT">Student Learner</option>
                <option value="PATRON">Staff Administrator</option>
            </select>

            <button type="submit" class="w-full py-4 text-lg mt-6 bg-yellow-500 text-white rounded-full font-bold shadow-lg hover:scale-[1.02] transition">
                Create Account & Enter Hub
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target).entries());

        const response = await fetch('/api/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            const result = await response.json();
            // 1. Save the keys
            localStorage.setItem('token', result.tokens.access);
            // 2. BOOM! Straight to Dashboard
            window.location.href = "/dashboard/";
        } else {
            const err = await response.json();
            alert("Error: " + JSON.stringify(err));
        }
    });
</script>
{% endblock %}
