<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodi Yangu | Modern Tax Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-gold: #eab308; /* Premium Gold */
            --apple-text: #1d1d1f;
            --apple-subtext: #86868b;
        }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--apple-bg); 
            color: var(--apple-text);
            scroll-behavior: smooth;
        }
        /* Apple-style Translucent Glass */
        .apple-nav {
            background: rgba(245, 245, 247, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        /* Soft Apple Card */
        .apple-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .apple-card:hover {
            transform: scale(1.01);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        }
        /* Golden Gradient Text */
        .gold-gradient {
            background: linear-gradient(180deg, #facc15 0%, #a16207 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Apple Pill Button */
        .btn-apple {
            background-color: var(--apple-gold);
            color: white;
            border-radius: 980px;
            font-weight: 600;
            padding: 12px 24px;
            transition: all 0.2s ease;
        }
        .btn-apple:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    
    <!-- Apple Nav -->
    <nav class="apple-nav fixed top-0 w-full z-50 h-[52px] flex items-center">
        <div class="max-w-6xl mx-auto w-full px-6 flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <a href="/" class="text-xl font-bold tracking-tight">Kodi <span class="text-yellow-600">Yangu</span></a>
                <div class="hidden md:flex space-x-6 text-xs font-normal text-gray-600">
                    <a href="/" class="hover:text-black transition">Platform</a>
                    <a href="#" class="hover:text-black transition">Guidelines</a>
                    <a href="#" class="hover:text-black transition">Support</a>
                </div>
            </div>
            <div class="flex items-center space-x-6 text-xs">
                <a href="{% url 'login-page' %}" class="hover:underline">Sign In</a>
                <a href="{% url 'register-page' %}" class="bg-black text-white px-3 py-1 rounded-full font-medium">Join Free</a>
            </div>
        </div>
    </nav>

    <main class="pt-[52px]">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-20 text-center text-gray-400 text-xs">
        <div class="max-w-3xl mx-auto border-t border-gray-200 pt-10">
            Copyright © 2026 Kodi Yangu Tanzania. All rights reserved.
        </div>
    </footer>
</body>
</html>
