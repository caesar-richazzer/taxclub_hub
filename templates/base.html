<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodi Yangu | The #1 Tax Education Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; overflow-x: hidden; }
        
        /* Liquid Background Glows */
        .liquid-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 10% 10%, rgba(250, 204, 21, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, rgba(161, 98, 7, 0.1) 0%, transparent 40%);
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
        }

        /* Golden Gradient Text */
        .gold-text {
            background: linear-gradient(to right, #fde047, #eab308, #b45309);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cluely-style Button */
        .btn-gold {
            background: linear-gradient(90deg, #facc15, #eab308);
            color: #000; font-weight: 800; border-radius: 1rem;
            box-shadow: 0 0 25px rgba(234, 179, 8, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(234, 179, 8, 0.5); }
    </style>
</head>
<body>
    <div class="liquid-glow"></div>
    
    <!-- Navigation -->
    <nav class="fixed top-6 w-full z-50 px-6">
        <div class="max-w-6xl mx-auto glass px-8 py-4 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tighter">KODI <span class="gold-text">YANGU</span></div>
            <div class="hidden md:flex space-x-10 text-sm font-semibold text-gray-400">
                <a href="/" class="hover:text-yellow-400">Platform</a>
                <a href="#" class="hover:text-yellow-400">TRA Guidelines</a>
                <a href="#" class="hover:text-yellow-400">Resources</a>
            </div>
            <div class="flex items-center space-x-6">
                <a href="{% url 'login-page' %}" class="text-sm font-bold text-gray-300">Sign In</a>
                <a href="{% url 'register-page' %}" class="btn-gold px-6 py-2.5 text-sm">Join Hub</a>
            </div>
        </div>
    </nav>

    <main class="pt-32">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
